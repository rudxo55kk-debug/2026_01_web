<!-- 문서 형식을 HTML5로 지정합니다 -->
<!DOCTYPE html>
<!-- html 태그: 페이지의 루트 요소, lang 속성으로 언어를 지정합니다 -->
<html lang="ko">
<head>
    <!-- head 요소: 문서 메타데이터(문서 제목, 문자셋 등)를 포함합니다 -->
    <meta charset="UTF-8">
    <title>이력서</title>
</head>
<body>
    <!-- body 요소: 실제 페이지에 보여질 컨텐츠가 이 안에 들어갑니다 -->
    <h1>이력서</h1> <!-- h1은 가장 높은 수준의 제목을 표시합니다 -->
    <table border="1" cellpadding="3" cellspacing="0">
        <!-- 사진과 기본 식별 -->
        <tr>
            <td rowspan="5" width="100" height="150">사진</td>
            <td colspan="2" height="30">성명</td>
            <td colspan="3" height="30">생년월일</td>
        </tr>
        <tr>
            <td colspan="2">김경태</td>
            <td colspan="3">2026년 3월 11일 (0세)</td>
        </tr>
        <!-- 주소 -->
        <tr>
            <td colspan="5" height="30">대전시 대덕구 한남로 70 정보통신공학과</td>
        </tr>
        <!-- 전화번호 -->
        <tr>
            <td colspan="2" height="30">042-629-7659</td>
            <td colspan="3" height="30">010-1234-5678</td>
        </tr>
        <!-- 가족관계 헤더 -->
        <tr>
            <td>관계</td>
            <td>성명</td>
            <td>연령</td>
            <td colspan="2">현재직업</td>
        </tr>
        <tr>
            <td>부</td>
            <td>김OO</td>
            <td>30</td>
            <td colspan="2">무직</td>
        </tr>
        <tr>
            <td>모</td>
            <td>구OO</td>
            <td>30</td>
            <td colspan="2">주부</td>
        </tr>
        <!-- 학력 및 경력 헤더 -->
        <tr>
            <td>연월일</td>
            <td colspan="3">학력 및 경력사항</td>
            <td>기관 및 장소</td>
        </tr>
        <tr>
            <td>2026/03/01</td>
            <td colspan="3">한남대 정보통신공학과 재학</td>
            <td></td>
        </tr>
        <!-- 빈 줄 여러개 추가해서 양식과 비슷하게 -->
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <tr><td colspan="5" height="20"></td></tr>
        <!-- 마무리 문구 -->
        <tr><td colspan="5">위의 기재한 내용은 사실과 다름이 없습니다.</td></tr>
        <tr><td colspan="5">20 년 월 일 작성자 (인)</td></tr>
    </table>
</body>
</html>
