<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수 선언식과 화살표 함수 예제</title>
</head>
<body>
    <h1>함수 선언식과 화살표 함수 예제</h1>
    <div id="result"></div>

    <script>
        // div 요소 가져오기
        let resultDiv = document.getElementById('result');

        // 선언식 함수: 두 수를 입력받아 합계를 반환
        function addDeclaration(a, b) {
            return a + b;
        }

        // 화살표 함수: 두 수를 입력받아 합계를 반환
        const addArrow = (a, b) => a + b;

        // 함수 호출 및 결과 출력
        let num1 = 5;
        let num2 = 10;

        resultDiv.innerHTML += "선언식 함수: " + num1 + " + " + num2 + " = " + addDeclaration(num1, num2) + "<br>";
        resultDiv.innerHTML += "화살표 함수: " + num1 + " + " + num2 + " = " + addArrow(num1, num2) + "<br>";
    </script>
</body>
</html>
