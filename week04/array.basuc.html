<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열 점수 평균과 필터</title>
</head>
<body>
    <h1>점수 처리 결과</h1>
    <div id="result"></div>

    <script>
        const scores = [];
        let total = 0;

        for (let i = 0; i < 10; i++) {
            const randomScore = Math.floor(Math.random() * 101);
            scores.push(randomScore);
            total += randomScore;
        }

        const average = total / scores.length;

        const underSixty = scores.filter(function (score) {
            return score < 60;
        });

        const resultDiv = document.getElementById("result");
        resultDiv.innerHTML = "생성된 점수 배열: " + scores.join(", ") + "<br>";
        resultDiv.innerHTML += "평균 점수: " + average.toFixed(2) + "<br>";
        resultDiv.innerHTML += "60점 미만 점수(filter): " + (underSixty.length > 0 ? underSixty.join(", ") : "없음");
    </script>
</body>
</html>
